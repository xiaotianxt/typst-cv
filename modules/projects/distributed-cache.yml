name: Global Edge Cache
affiliation: Personal Infrastructure Project
startDate: 2024-01-01
endDate: Present
url: https://github.com/example/global-edge-cache
highlights:
  - >-
    Built a geo-replicated cache service in *Go* with *Raft*-backed metadata
    replication and consistent hash-based request routing.
  - >-
    Implemented write-through persistence in *PostgreSQL* with background
    snapshotting and crash-safe replay for fast recovery.
  - >-
    Added load-test harnesses and fault injection to validate leader failover,
    hot-key rebalancing, and tail-latency behavior under burst traffic.
