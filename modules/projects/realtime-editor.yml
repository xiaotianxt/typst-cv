name: Realtime Collaborative Editor
affiliation: Product Engineering Project
startDate: 2022-09-01
endDate: 2023-01-01
url: https://github.com/example/realtime-editor
highlights:
  - >-
    Built a collaborative editor with *TypeScript*, *WebSocket* sync, and
    operational transform conflict resolution for low-latency multiplayer edits.
  - >-
    Added presence, comments, and durable version history using *Redis* streams
    and append-only document snapshots.
  - >-
    Deployed the stack with *Docker* and *GitHub Actions*, shipping preview
    environments for every pull request.
